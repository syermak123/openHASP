; Local override for CYD ESP32-2432S028
; This file is intentionally local (not tracked by upstream by default).

[platformio]
extra_configs =
    user_setups/esp32/esp32-2432s028.ini

[override]
extra_default_envs =
    cyd_2432s028_landscape_4MB

; CYD 2.8" (ESP32-2432S028) - landscape orientation
[env:cyd_2432s028_landscape_4MB]
extends = esp32-2432s028_v2, flash_4mb
build_flags =
    ${esp32-2432s028_v2.build_flags}
    ; --- Landscape ---
    -D TFT_ROTATION=1
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=240
    ; Touch alignment for landscape (XPT2046)
    -D TOUCH_OFFSET_ROTATION=2
    -D TOUCH_DRIVER=0x2046
    -D HASP_USE_LGFX_TOUCH=1
    -D TOUCH_CS=33
    -D TOUCH_SCLK=25
    -D TOUCH_MOSI=32
    -D TOUCH_MISO=39
    -D TOUCH_SDA=-1
    -D TOUCH_SCL=-1
    -D TOUCH_IRQ=36
    -D SPI_TOUCH_FREQUENCY=2500000
    ; Keep normal colors by default
    -D INVERT_COLORS=0
    ; Disable FreeType in this local build (avoids missing ft2build.h toolchain setup)
    -D HASP_USE_FREETYPE=0
    -D LV_USE_FREETYPE=0
    ; Enable custom code in /src/custom (for Open-Meteo direct weather)
    -D HASP_USE_CUSTOM=1
    ; v2 profile already uses ILI9341 driver and revised panel params

